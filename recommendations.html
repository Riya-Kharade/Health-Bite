                    icon: "apple-alt",
                    steps: [
                        "Slice one medium apple into thin wedges.",
                        "Serve with 2 tablespoons of natural almond butter.",
                        "Sprinkle cinnamon on top for extra flavor."
                    ]
                }
            ]
        };

        let activeTab = 'breakfast';
        const favorites = JSON.parse(localStorage.getItem('hb_favorites')) || [];
        const userData = JSON.parse(localStorage.getItem('hb_user_data')) || { goal: 'maintain' };
        if (document.getElementById('goalTag')) {
            document.getElementById('goalTag').textContent = userData.goal.replace('-', ' ');
        }

        const render = () => {
            const grid = document.getElementById('recipesGrid');
            grid.innerHTML = '';
            
            const list = recipeDb[activeTab];
            const currentLang = localStorage.getItem('language') || 'en';
            const translations = window.HealthBiteTranslations || {};
            const langData = translations[currentLang] || translations['en'] || {};

            list.forEach(r => {
                const isFav = favorites.includes(r.id);
                grid.innerHTML += `
                    <div class="card reveal active">
                        <div class="card-img-wrapper">
                            <img src="${r.img}" alt="${r.name}">
                            <div class="card-icon"><i class="fas fa-${r.icon}"></i></div>
                        </div>
                        <div class="card-body">
                            <span style="color: var(--orange-accent); font-weight: 800; font-size: 0.8rem;">${r.cal} ${langData.kcal || 'kcal'}</span>
                            <h3 style="margin-top: 5px;">${r.name}</h3>
                            <button class="btn btn-primary mt-20" onclick="showInstructions('${activeTab}', '${r.id}')" style="width: 100%; border-radius: 12px; padding: 15px;">${langData.getInstructions || 'Get Instructions'}</button>
                            
                            <div class="card-actions">
                                <button class="btn-icon ${isFav ? 'active' : ''}" onclick="toggleFavorite('${r.id}', this)">
                                    <i class="${isFav ? 'fas' : 'far'} fa-heart"></i>
                                </button>
                                <button class="btn-icon" onclick="addToTracker('${r.name}', ${r.cal})" title="Add to Tracker">
                                    <i class="fas fa-plus"></i>
                                </button>
                                <div style="flex-grow: 1;"></div>
                                <span style="font-size: 0.8rem; color: var(--text-muted); align-self: center;">${activeTab.toUpperCase()}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
        };

        window.showInstructions = (tab, id) => {
            const recipe = recipeDb[tab].find(r => r.id === id);
            const modal = document.getElementById('instructionsModal');
            const body = document.getElementById('modalBody');
            const currentLang = localStorage.getItem('language') || 'en';
            const translations = window.HealthBiteTranslations || {};
            const langData = translations[currentLang] || translations['en'] || {};

            body.innerHTML = `
                <h2 style="font-size: 2.2rem; margin-bottom: 10px;">${recipe.name}</h2>
                <span style="color: var(--primary-green); font-weight: 800; letter-spacing: 1px;">${recipe.cal} ${langData.kcal || 'kcal'}</span>
                
                <ul class="instruction-list">
                    ${recipe.steps.map(step => `<li>${step}</li>`).join('')}
                </ul>
                
                <button class="btn btn-primary mt-20" style="width: 100%;" onclick="closeModal()">${langData.gotIt || 'Got it!'}</button>
            `;

            modal.classList.add('active');
        };

        window.closeModal = () => {
            document.getElementById('instructionsModal').classList.remove('active');
        };

        window.toggleFavorite = (id, btn) => {
            const idx = favorites.indexOf(id);
            if (idx === -1) {
                favorites.push(id);
                btn.classList.add('active');
                btn.querySelector('i').className = 'fas fa-heart';
            } else {
                favorites.splice(idx, 1);
                btn.classList.remove('active');
                btn.querySelector('i').className = 'far fa-heart';
            }
            localStorage.setItem('hb_favorites', JSON.stringify(favorites));
        };

        window.addToTracker = (name, cal) => {
            const currentLang = localStorage.getItem('language') || 'en';
            const translations = window.HealthBiteTranslations || {};
            const langData = translations[currentLang] || translations['en'] || {};
            
            let dailyLog = JSON.parse(localStorage.getItem('hb_daily_log')) || [];
            const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            dailyLog.push({ name, cal, time });
            localStorage.setItem('hb_daily_log', JSON.stringify(dailyLog));
            alert(`${name} ${langData.addedToTracker || 'added to your Daily Tracker!'}`);
        };

        document.querySelectorAll('.filter-chip').forEach(chip => {
            chip.onclick = function() {
                document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
                this.classList.add('active');
                activeTab = this.dataset.time;
                render();
            }
        });

        // Close modal on backdrop click
        window.onclick = (e) => {
            const modal = document.getElementById('instructionsModal');
            if (e.target === modal) closeModal();
        };

        render();
    </script>
