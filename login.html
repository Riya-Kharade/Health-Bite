<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | HealthBite</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body style="height: 100vh; display: flex; align-items: center; justify-content: center; background-image: url('images/hero-bg.jpg'); background-size: cover; background-position: center;">
    
    <div class="hero-overlay"></div>

    <div class="container reveal active" style="z-index: 10; max-width: 450px;">
        <div class="form-container" style="padding: 40px; box-shadow: 0 30px 60px rgba(0,0,0,0.3);">
            <div class="text-center mb-40">
                <a href="index.html" class="logo" style="justify-content: center; font-size: 2rem;">
                    <i class="fas fa-leaf"></i> Health<span>Bite</span>
                </a>
                <h2 style="margin-top: 20px;" data-i18n="welcomeBack">Welcome Back</h2>
                <p data-i18n="loginDesc">Login to continue your healthy journey.</p>
            </div>

            <form id="loginForm">
                <div class="form-group" style="margin-bottom: 20px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 700;" data-i18n="emailAddress">Email Address</label>
                    <div style="position: relative;">
                        <i class="fas fa-envelope" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--dark-green);"></i>
                        <input type="email" id="email" placeholder="email@example.com" style="padding-left: 45px;" required>
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 30px;">
                    <label style="display: block; margin-bottom: 8px; font-weight: 700;" data-i18n="password">Password</label>
                    <div style="position: relative;">
                        <i class="fas fa-lock" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--dark-green);"></i>
                        <input type="password" id="password" placeholder="••••••••" style="padding-left: 45px;" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 18px;" data-i18n="loginBtn">Login</button>
                
                <p id="errorMsg" style="color: #e74c3c; text-align: center; margin-top: 15px; display: none; font-weight: 600;"></p>

                <div class="text-center mt-20" style="margin-top: 30px;">
                    <p style="font-size: 0.9rem;"><span data-i18n="noAccount">Don't have an account?</span> <a href="register.html" style="color: var(--dark-green); font-weight: 700; text-decoration: none;" data-i18n="registerLink">Register Now</a></p>
                </div>
            </form>
        </div>
    </div>

    <script src="js/translations.js"></script>
    <script src="js/global.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
